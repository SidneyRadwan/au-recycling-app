# LiteLLM Proxy Configuration
# Docs: https://docs.litellm.ai/docs/proxy/configs
#
# This proxy sits between the backend and AI providers so the model can be
# swapped via env var without changing application code.
# The backend calls http://litellm:4000 (internal) using the OpenAI-compatible API.

model_list:
  - model_name: default          # logical name used by the backend
    litellm_params:
      model: ${LITELLM_DEFAULT_MODEL}   # e.g. claude-sonnet-4-6, gpt-4o, gemini/gemini-2.0-flash
      api_key: ${LITELLM_API_KEY}

litellm_settings:
  # Drop unsupported params rather than erroring
  drop_params: true

  # Request/response logging to stdout (useful in dev)
  set_verbose: false

general_settings:
  # Master key used by the backend to authenticate to this proxy
  master_key: ${LITELLM_MASTER_KEY}
