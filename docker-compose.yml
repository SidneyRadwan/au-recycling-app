services:
  # Dev container service — used by .devcontainer/devcontainer.json
  # Frontend and backend run via VS Code tasks, not as Docker services.
  devcontainer:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace:cached
    command: sleep infinity
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/recycling
      DATABASE_USERNAME: recycling
      DATABASE_PASSWORD: recycling_dev
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: recycling
      POSTGRES_USER: recycling
      POSTGRES_PASSWORD: recycling_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recycling"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm_db:
    image: postgres:16
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm_dev
    volumes:
      - litellm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 5s
      retries: 5

  # LiteLLM proxy — OpenAI-compatible API gateway in front of all AI providers.
  # Backend calls http://litellm:4000 internally; swap models via LITELLM_DEFAULT_MODEL.
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_DEFAULT_MODEL: ${LITELLM_DEFAULT_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-dev-master-key}
      DATABASE_URL: postgresql://litellm:litellm_dev@litellm_db:5432/litellm
    depends_on:
      litellm_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
  litellm_postgres_data:
