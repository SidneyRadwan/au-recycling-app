- slug: city-of-melbourne
  name: City of Melbourne
  state: VIC
  website: https://www.melbourne.vic.gov.au
  recycling_url: https://www.melbourne.vic.gov.au/residents/waste-recycling
  description: >
    City of Melbourne operates a four-bin system: red-lid general waste,
    yellow-lid recycling, lime-green FOGO (food and garden organics), and
    a purple-lid glass-only bin in some precincts. The FOGO service accepts
    all food scraps including meat and dairy.
  suburbs:
    - Melbourne CBD
    - Carlton
    - Fitzroy
    - Richmond
    - South Yarra
    - St Kilda Road Precinct
    - Port Melbourne
    - Docklands
    - Southbank
    - East Melbourne
    - North Melbourne
    - Parkville
    - West Melbourne
    - Kensington

- slug: brisbane-city
  name: Brisbane City Council
  state: QLD
  website: https://www.brisbane.qld.gov.au
  recycling_url: https://www.brisbane.qld.gov.au/bins-waste-and-recycling/kerbside-collection
  description: >
    Brisbane City Council operates a three-bin kerbside system: red-lid general
    waste (weekly), yellow-lid recycling (fortnightly) and green-lid garden organics
