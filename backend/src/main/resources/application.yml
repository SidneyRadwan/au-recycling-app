spring:
  application:
    name: australia-recycling-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/recycling}
    username: ${DATABASE_USERNAME:recycling}
    password: ${DATABASE_PASSWORD:recycling_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 8080
