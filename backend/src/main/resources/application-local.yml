spring:
  datasource:
    url: jdbc:h2:mem:recycling;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      data-locations: classpath:db/local-seed.sql
  h2:
    console:
      enabled: true    # http://localhost:8080/h2-console

logging:
  level:
    com.australiarecycling: DEBUG
